<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
<link rel="icon" href="data:," />
<title>VORTEX Original - Shop</title>
<style>
  @font-face { font-family:'Bebas Neue'; src:url('fonts/bebas-neue-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Space Grotesk'; src:url('fonts/space-grotesk-variable.woff2') format('woff2'); font-weight:300 700; font-display:swap; }
  @font-face { font-family:'Space Mono'; src:url('fonts/space-mono-400.woff2') format('woff2'); font-weight:400; font-display:swap; }
  @font-face { font-family:'Space Mono'; src:url('fonts/space-mono-700.woff2') format('woff2'); font-weight:700; font-display:swap; }
  :root{
    --bg:#f5f7f8; --ink:#071018; --muted:rgba(7,16,24,.66); --soft:rgba(7,16,24,.46);
    --dark:#03070b; --dark-2:#071018; --accent:#4fc3d6; --amber:#f4a942; --good:#16864a;
    --line:rgba(7,16,24,.12); --line-dark:rgba(238,244,248,.16); --shadow:0 24px 70px rgba(7,16,24,.16);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth;background:var(--bg)}
  body{font-family:'Space Grotesk',system-ui,sans-serif;background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  button{font:inherit}
  .page{min-height:100vh}
  .wrap{width:100%;max-width:1220px;margin:0 auto;padding:0 24px}
  .title{font-family:'Bebas Neue',sans-serif;font-weight:400;letter-spacing:.035em;text-transform:uppercase;line-height:.9}
  .eyebrow{display:inline-flex;align-items:center;gap:.7rem;font-family:'Space Mono',monospace;font-weight:700;font-size:.66rem;letter-spacing:.22em;text-transform:uppercase;color:#087c91}
  .eyebrow::before{content:"";width:30px;height:1px;background:#087c91}
  .btn{display:inline-flex;align-items:center;justify-content:center;min-height:48px;border-radius:999px;border:1px solid transparent;padding:.88rem 1.35rem;font-family:'Space Mono',monospace;font-weight:700;font-size:.7rem;letter-spacing:.13em;text-transform:uppercase;cursor:pointer;transition:transform .25s,box-shadow .25s,background .25s}
  .btn:hover{transform:translateY(-2px)}
  .btn-primary{background:var(--ink);color:white;box-shadow:0 16px 34px rgba(7,16,24,.18)}
  .btn-teal{background:var(--accent);color:#021017;box-shadow:0 16px 36px rgba(79,195,214,.32)}
  .btn-amber{background:var(--amber);color:#241403;box-shadow:0 16px 36px rgba(244,169,66,.26)}
  .btn-ghost{border-color:var(--line);background:rgba(255,255,255,.7)}
  nav{position:fixed;top:0;left:0;right:0;z-index:50;background:rgba(245,247,248,.76);backdrop-filter:blur(18px);border-bottom:1px solid rgba(7,16,24,.08)}
  nav .wrap{height:72px;display:flex;align-items:center;justify-content:space-between;gap:1rem}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:.2em}
  .nav-links{display:flex;align-items:center;gap:1.25rem;color:var(--muted);font-size:.84rem}
  .nav-links a:hover{color:var(--ink)}
  .nav-links .btn{min-height:38px;padding:.58rem 1.05rem;font-size:.62rem}
  .switcher{position:fixed;left:50%;top:84px;z-index:60;display:flex;gap:.35rem;padding:.36rem;border:1px solid rgba(7,16,24,.12);border-radius:999px;background:rgba(245,247,248,.84);backdrop-filter:blur(16px);transform:translateX(-50%);box-shadow:var(--shadow)}
  .switcher a{border-radius:999px;padding:.55rem .82rem;font-family:'Space Mono',monospace;font-size:.57rem;letter-spacing:.11em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
  .switcher a.active{background:var(--ink);color:white}
  .cursor-dot,.cursor-ring{display:none}
  @media(pointer:fine){
    body.has-cursor,body.has-cursor a,body.has-cursor button{cursor:none}
    .cursor-dot,.cursor-ring{display:block;position:fixed;left:0;top:0;z-index:100;pointer-events:none;border-radius:50%;transform:translate3d(-50%,-50%,0);mix-blend-mode:multiply}
    .cursor-dot{width:7px;height:7px;background:var(--accent);box-shadow:0 0 18px rgba(79,195,214,.7)}
    .cursor-ring{width:34px;height:34px;border:1px solid rgba(7,16,24,.28);transition:width .18s,height .18s,border-color .18s,background .18s}
    body.cursor-hot .cursor-ring{width:54px;height:54px;border-color:rgba(79,195,214,.75);background:rgba(79,195,214,.08)}
  }

  .hero{position:relative;min-height:100vh;padding:116px 0 70px;display:grid;align-items:center;overflow:hidden;background:
    radial-gradient(70% 64% at 56% 42%,rgba(79,195,214,.18),transparent 58%),
    linear-gradient(180deg,#ffffff 0%,#f4f7f8 64%,#e9eff1 100%)}
  .hero::before{content:"";position:absolute;inset:auto -10% -35% -10%;height:58%;background:radial-gradient(50% 50% at 50% 40%,rgba(79,195,214,.34),transparent 70%);filter:blur(20px);pointer-events:none}
  .hero-grid{position:relative;z-index:1;display:grid;grid-template-columns:.9fr 1.1fr;gap:clamp(2rem,4vw,4.8rem);align-items:center}
  .hero-copy h1{font-size:clamp(4.2rem,9vw,9rem);margin:.8rem 0 1rem}
  .subhead{max-width:33rem;color:var(--muted);font-size:clamp(1rem,1.55vw,1.2rem);line-height:1.58}
  .hero-actions{display:flex;gap:.8rem;flex-wrap:wrap;margin-top:1.45rem}
  .motion-stage{position:relative;min-height:620px;display:grid;place-items:center}
  .orb{position:absolute;width:74%;aspect-ratio:1;border-radius:50%;background:radial-gradient(circle,rgba(79,195,214,.38),rgba(79,195,214,.08) 46%,transparent 70%);filter:blur(14px)}
  .can-frame{position:relative;width:min(100%,590px);border-radius:36px;padding:24px;background:linear-gradient(180deg,rgba(255,255,255,.82),rgba(255,255,255,.36));border:1px solid rgba(7,16,24,.09);box-shadow:var(--shadow);overflow:hidden}
  .can-frame img{width:100%;display:block;aspect-ratio:880/720;object-fit:contain;filter:drop-shadow(0 32px 50px rgba(7,16,24,.18))}
  .can-caption{display:flex;justify-content:space-between;gap:1rem;margin-top:.9rem;font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--soft)}
  .dark-band{background:var(--dark);color:#eef4f8;position:relative;overflow:hidden}
  .dark-band::before{content:"";position:absolute;inset:0;background:radial-gradient(70% 42% at 50% 0%,rgba(79,195,214,.16),transparent 68%);pointer-events:none}
  .stats{position:relative;z-index:1;display:grid;grid-template-columns:repeat(4,1fr);gap:1px;border-top:1px solid var(--line-dark);border-bottom:1px solid var(--line-dark)}
  .stat{padding:1.5rem;text-align:center;border-left:1px solid var(--line-dark)}
  .stat:first-child{border-left:0}
  .stat b{display:block;font-family:'Bebas Neue',sans-serif;font-size:3.1rem;letter-spacing:.04em;color:var(--accent);line-height:.85}
  .stat span{font-family:'Space Mono',monospace;font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:rgba(238,244,248,.62)}
  .section{padding:clamp(76px,12vh,136px) 0}
  .section-head{text-align:center;max-width:760px;margin:0 auto 56px}
  .section-head h2{font-size:clamp(3rem,7vw,6.4rem);margin-top:1rem}
  .pin{min-height:130vh;display:grid;align-items:start}
  .pin-inner{position:sticky;top:84px;display:grid;grid-template-columns:1fr 1fr;gap:clamp(2rem,5vw,5rem);align-items:center;padding:44px 0}
  .pin h2{font-size:clamp(3.8rem,8vw,8rem)}
  .pin p{margin-top:1rem;max-width:31rem;color:rgba(238,244,248,.68);font-size:1.1rem;line-height:1.65}
  .pin-product{position:relative;min-height:540px;display:grid;place-items:center}
  .pin-product img{position:relative;z-index:1;width:min(100%,520px);aspect-ratio:880/720;object-fit:contain;filter:drop-shadow(0 34px 70px rgba(0,0,0,.5))}
  .pin-vortex{position:absolute;width:80%;aspect-ratio:1;border-radius:50%;background:conic-gradient(from 40deg,transparent,rgba(79,195,214,.7),transparent,rgba(255,255,255,.52),transparent);filter:blur(18px);opacity:.66}
  .cold-drop{position:relative;min-height:140vh;background:#03070b;color:#eef4f8;overflow:hidden}
  .cold-drop::before{content:"";position:absolute;inset:0;background:radial-gradient(70% 42% at 48% 22%,rgba(79,195,214,.22),transparent 70%),linear-gradient(180deg,#03070b 0%,#071018 52%,#03070b 100%);pointer-events:none}
  .cold-inner{position:sticky;top:0;min-height:100vh;display:grid;align-items:center;padding:118px 0 72px}
  .cold-grid{position:relative;z-index:1;display:grid;grid-template-columns:.86fr 1.14fr;gap:clamp(1.8rem,4vw,4.8rem);align-items:center}
  .cold-copy h2{font-size:clamp(3.8rem,8vw,8rem);margin:.85rem 0 1rem}
  .cold-copy p{max-width:32rem;color:rgba(238,244,248,.68);font-size:1.08rem;line-height:1.64}
  .cold-proof{display:grid;grid-template-columns:repeat(3,1fr);gap:.72rem;margin-top:1.35rem;max-width:34rem}
  .cold-proof span{border:1px solid var(--line-dark);border-radius:16px;padding:.78rem .82rem;background:rgba(255,255,255,.04);font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.1em;text-transform:uppercase;color:rgba(238,244,248,.72)}
  .cooler-frame{position:relative;border-radius:36px;overflow:hidden;border:1px solid var(--line-dark);background:#050b10;box-shadow:0 40px 120px rgba(0,0,0,.45)}
  .cooler-frame video{display:block;width:100%;aspect-ratio:16/9;object-fit:cover}
  .cooler-frame::after{content:"";position:absolute;inset:0;background:linear-gradient(180deg,rgba(255,255,255,.08),transparent 34%,rgba(3,7,11,.34));pointer-events:none}
  .cooler-caption{position:absolute;left:18px;right:18px;bottom:18px;display:flex;justify-content:space-between;gap:1rem;font-family:'Space Mono',monospace;font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:rgba(238,244,248,.72)}
  .features{display:grid;gap:1.2rem}
  .feature-card{display:grid;grid-template-columns:.9fr 1.1fr;gap:2rem;align-items:center;min-height:420px;padding:clamp(1rem,2.6vw,2rem);border:1px solid var(--line);border-radius:32px;background:white;box-shadow:var(--shadow);overflow:hidden}
  .feature-card:nth-child(even){grid-template-columns:1.1fr .9fr}
  .feature-card:nth-child(even) .feature-copy{order:2}
  .feature-copy h3{font-size:clamp(3rem,6vw,5.5rem)}
  .feature-copy p{max-width:30rem;margin-top:.8rem;color:var(--muted);font-size:1.03rem;line-height:1.62}
  .feature-card img{width:100%;height:380px;object-fit:cover;border-radius:24px}
  .commerce{display:grid;grid-template-columns:1fr 420px;gap:clamp(1.5rem,4vw,4rem);align-items:start}
  .commerce h2{font-size:clamp(3.7rem,8vw,7.6rem)}
  .reviews{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:2rem}
  .review{border:1px solid var(--line);border-radius:22px;padding:1.2rem;background:white}
  .review .stars{color:var(--amber);letter-spacing:.08em}
  .review h4{margin:.55rem 0 .35rem;font-size:1.02rem}
  .review p{color:var(--muted);line-height:1.55;font-size:.94rem}
  .review-meta{display:flex;justify-content:space-between;gap:.8rem;margin-top:.9rem;color:var(--soft);font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.08em;text-transform:uppercase}
  .rating-panel{display:grid;grid-template-columns:120px 1fr;gap:1.1rem;align-items:center;margin-top:1.2rem;padding:1rem;border:1px solid var(--line);border-radius:22px;background:rgba(255,255,255,.72)}
  .rating-score{font-family:'Bebas Neue',sans-serif;font-size:4.4rem;line-height:.85}
  .rating-score span{display:block;margin-top:.25rem;font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.12em;color:var(--muted)}
  .rating-bars{display:grid;gap:.48rem}
  .rating-bar{display:grid;grid-template-columns:46px 1fr 34px;align-items:center;gap:.55rem;color:var(--muted);font-size:.75rem}
  .rating-bar i{display:block;height:8px;border-radius:999px;background:linear-gradient(90deg,var(--accent),#b8f4ff);width:var(--w)}
  .rating-track{height:8px;border-radius:999px;background:rgba(7,16,24,.08);overflow:hidden}
  .buy-box{position:sticky;top:100px;border:1px solid var(--line);border-radius:28px;padding:1.3rem;background:white;box-shadow:var(--shadow)}
  .price-line{display:flex;align-items:flex-end;gap:.6rem;flex-wrap:wrap}
  .price{font-family:'Bebas Neue',sans-serif;font-size:3.35rem;line-height:.9}
  .was{text-decoration:line-through;color:var(--soft)}
  .per{font-family:'Space Mono',monospace;font-size:.64rem;letter-spacing:.09em;color:var(--muted)}
  .stock{margin-top:.9rem;color:var(--good);font-weight:700}
  .delivery{margin-top:.3rem;color:var(--muted);line-height:1.55;font-size:.92rem}
  .delivery b{color:var(--ink)}
  .qty-row{display:flex;align-items:center;justify-content:space-between;gap:1rem;margin:1.1rem 0}
  .qty{display:inline-flex;align-items:center;border:1px solid var(--line);border-radius:999px;overflow:hidden}
  .qty button{width:40px;height:40px;border:0;background:white;cursor:pointer}
  .qty button:hover{background:#eef4f8}
  .qty span{min-width:34px;text-align:center;font-family:'Space Mono',monospace}
  .pack-note{text-align:right;color:var(--muted);font-size:.9rem}
  .buy-actions{display:grid;grid-template-columns:1fr 1fr;gap:.7rem}
  .secure{margin-top:.9rem;color:var(--muted);font-family:'Space Mono',monospace;font-size:.58rem;letter-spacing:.1em;text-transform:uppercase}
  .choice-row{display:grid;grid-template-columns:1fr 1fr;gap:.6rem;margin:1rem 0}
  .choice{border:1px solid var(--line);border-radius:18px;padding:.8rem;background:white;text-align:left;cursor:pointer;color:var(--ink)}
  .choice.active{border-color:var(--accent);box-shadow:0 0 0 3px rgba(79,195,214,.16)}
  .choice b{display:block;font-size:.9rem}
  .choice span{display:block;margin-top:.2rem;color:var(--muted);font-size:.78rem}
  .buy-lines{display:grid;gap:.48rem;margin:.85rem 0;padding:.85rem 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
  .buy-line{display:flex;justify-content:space-between;gap:1rem;color:var(--muted);font-size:.88rem}
  .buy-line strong{color:var(--ink)}
  .checkout-note{margin-top:.75rem;padding:.72rem .82rem;border-radius:16px;background:#eef8fa;color:#075d6b;font-size:.84rem;line-height:1.45}
  .launch-note{margin-top:.9rem;color:var(--soft);font-size:.78rem;line-height:1.45}
  footer{padding:44px 0 86px;border-top:1px solid var(--line);color:var(--muted)}
  footer .wrap{display:flex;align-items:center;justify-content:space-between;gap:1rem;flex-wrap:wrap}
  footer a{margin-left:1rem;color:var(--muted)}
  footer a:hover{color:var(--ink)}

  @media(max-width:940px){
    .hero-grid,.pin-inner,.cold-grid,.feature-card,.feature-card:nth-child(even),.commerce{grid-template-columns:1fr}
    .hero-copy{text-align:center;order:2}
    .hero-actions,.hero-copy .eyebrow{justify-content:center}
    .subhead{margin-inline:auto}
    .motion-stage{min-height:460px}
    .pin-inner{position:relative;top:auto;text-align:center}
    .pin p{margin-inline:auto}
    .feature-card:nth-child(even) .feature-copy{order:0}
    .reviews{grid-template-columns:1fr}
    .buy-box{position:relative;top:auto}
  }
  @media(max-width:680px){
    .wrap{padding:0 20px}
    .nav-links a:not(.btn){display:none}
    .hero{padding-top:152px}
    .hero-copy h1{font-size:clamp(3.5rem,16vw,5.7rem)}
    .motion-stage{min-height:350px}
    .can-frame{padding:12px;border-radius:24px}
    .stats{grid-template-columns:repeat(2,1fr)}
    .stat:nth-child(3){border-left:0;border-top:1px solid var(--line-dark)}
    .stat:nth-child(4){border-top:1px solid var(--line-dark)}
    .pin-product{min-height:360px}
    .cold-inner{position:relative;min-height:auto;padding:110px 0 76px}
    .cold-proof{grid-template-columns:1fr}
    .cooler-frame{border-radius:24px}
    .feature-card img{height:270px}
    .buy-actions{grid-template-columns:1fr}
    .switcher{max-width:calc(100vw - 24px);overflow:auto}
    .switcher a{font-size:.52rem;padding:.5rem .62rem}
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@18.2.0",
    "react-dom/client": "https://esm.sh/react-dom@18.2.0/client",
    "framer-motion": "https://esm.sh/framer-motion@10.16.16?external=react,react-dom"
  }
}
</script>
<script type="module">
  import React, { useEffect, useRef, useState } from 'react';
  import { createRoot } from 'react-dom/client';
  import { motion, useScroll, useTransform } from 'framer-motion';

  const h = React.createElement;
  const ease = [0.2, 0.7, 0.2, 1];
  const frame = (n) => 'frames/frame_' + String(Math.max(1, Math.min(477, n))).padStart(4, '0') + '.jpg';
  const reveal = {
    initial: { opacity: 0, y: 28 },
    whileInView: { opacity: 1, y: 0 },
    viewport: { once: true, amount: 0.22 },
    transition: { duration: 0.72, ease }
  };

  function Cursor(){
    useEffect(() => {
      if (!matchMedia('(pointer:fine)').matches) return;
      const dot = document.querySelector('.cursor-dot');
      const ring = document.querySelector('.cursor-ring');
      if (!dot || !ring) return;
      document.body.classList.add('has-cursor');
      let x = innerWidth / 2, y = innerHeight / 2, rx = x, ry = y;
      const move = (e) => { x = e.clientX; y = e.clientY; dot.style.transform = `translate3d(${x}px,${y}px,0) translate(-50%,-50%)`; };
      const hot = (e) => document.body.classList.toggle('cursor-hot', Boolean(e.target.closest('a,button,.can-frame,.cooler-frame')));
      const loop = () => { rx += (x - rx) * 0.18; ry += (y - ry) * 0.18; ring.style.transform = `translate3d(${rx}px,${ry}px,0) translate(-50%,-50%)`; requestAnimationFrame(loop); };
      addEventListener('mousemove', move);
      addEventListener('mouseover', hot);
      loop();
      return () => { document.body.classList.remove('has-cursor','cursor-hot'); removeEventListener('mousemove', move); removeEventListener('mouseover', hot); };
    }, []);
    return h(React.Fragment, null, h('div', { className:'cursor-dot' }), h('div', { className:'cursor-ring' }));
  }

  function Nav(){
    return h('nav', null, h('div', { className:'wrap' },
        h('a', { className:'logo', href:'#top' }, 'VORTEX'),
        h('div', { className:'nav-links' },
          h('a', { href:'#motion' }, 'Motion'),
          h('a', { href:'#cold' }, 'Cold drop'),
          h('a', { href:'#reviews' }, 'Reviews'),
          h('a', { href:'index.html' }, 'The film'),
          h('a', { className:'btn btn-primary', href:'#buy' }, 'Early access')
        )
      )
    );
  }

  function ProductHero(){
    const heroFrames = [70, 88, 106, 124, 142, 160, 178, 196, 214, 232, 250].map(frame);
    const [src, setSrc] = useState(heroFrames[0]);
    useEffect(() => {
      heroFrames.forEach((url) => { const img = new Image(); img.src = url; });
      let i = 0;
      const id = setInterval(() => { i = (i + 1) % heroFrames.length; setSrc(heroFrames[i]); }, 220);
      return () => clearInterval(id);
    }, []);
    return h('section', { className:'hero', id:'top' }, h('div', { className:'wrap hero-grid' },
      h(motion.div, { className:'hero-copy', ...reveal },
        h('span', { className:'eyebrow' }, 'VORTEX motion shop'),
        h(motion.h1, { className:'title', initial:{opacity:0,y:24}, animate:{opacity:1,y:0}, transition:{duration:.8,ease} }, 'Original, before it lands.'),
        h('p', { className:'subhead' }, 'VORTEX Original is in prelaunch. This page is built to show the cold, focused world of the brand while formula, production, and availability are still being validated.'),
        h('div', { className:'hero-actions' },
          h('a', { className:'btn btn-primary', href:'#buy' }, 'Join early access'),
          h('a', { className:'btn btn-ghost', href:'index.html' }, 'Watch the film')
        )
      ),
      h(motion.div, { className:'motion-stage', initial:{opacity:0,scale:.96}, animate:{opacity:1,scale:1}, transition:{duration:.9,ease} },
        h(motion.div, { className:'orb', animate:{rotate:360,scale:[1,1.06,1]}, transition:{rotate:{duration:20,repeat:Infinity,ease:'linear'},scale:{duration:5,repeat:Infinity,ease:'easeInOut'}} }),
        h(motion.div, { className:'can-frame', whileHover:{y:-8,rotate:-1}, transition:{type:'spring',stiffness:140,damping:18} },
          h('img', { src, alt:'VORTEX Original rotating can' }),
          h('div', { className:'can-caption' }, h('span', null, 'Animated frame sequence'), h('span', null, 'VORTEX Original'))
        )
      )
    ));
  }

  function Stats(){
    return h('div', { className:'dark-band' }, h('div', { className:'wrap stats' },
      [['200','mg caffeine target'],['0','g sugar target'],['16','fl oz target'],['1','original concept']].map((s) =>
        h(motion.div, { className:'stat', key:s[1], ...reveal }, h('b', null, s[0]), h('span', null, s[1]))
      )
    ));
  }

  function MotionMoment(){
    const { scrollYProgress } = useScroll();
    const rotate = useTransform(scrollYProgress, [0, 1], [0, 28]);
    const scale = useTransform(scrollYProgress, [0, .55, 1], [1, 1.06, 1]);
    const [src, setSrc] = useState(frame(92));
    useEffect(() => scrollYProgress.on('change', (v) => setSrc(frame(92 + Math.round(v * 210)))), [scrollYProgress]);
    return h('section', { className:'dark-band section pin', id:'motion' }, h('div', { className:'wrap pin-inner' },
      h(motion.div, { ...reveal },
        h('span', { className:'eyebrow' }, 'Scroll-led product story'),
        h('h2', { className:'title' }, 'The cold pull starts here.'),
        h('p', null, 'The product frame and vortex field move with the page, turning the shop into a VORTEX launch moment before asking for early-access interest.')
      ),
      h('div', { className:'pin-product' },
        h(motion.div, { className:'pin-vortex', style:{ rotate, scale } }),
        h(motion.img, { src, alt:'Scroll animated VORTEX Original can', style:{ rotate, scale } })
      )
    ));
  }

  function ColdDrop(){
    const ref = useRef(null);
    const { scrollYProgress } = useScroll({ target: ref, offset: ['start end', 'end start'] });
    const y = useTransform(scrollYProgress, [0, .5, 1], [70, 0, -40]);
    const scale = useTransform(scrollYProgress, [0, .45, 1], [.94, 1.04, .98]);
    const opacity = useTransform(scrollYProgress, [0, .18, .85, 1], [.45, 1, 1, .62]);
    return h('section', { className:'cold-drop', ref, id:'cold' }, h('div', { className:'cold-inner' }, h('div', { className:'wrap cold-grid' },
      h(motion.div, { className:'cold-copy', style:{ y, opacity } },
        h('span', { className:'eyebrow' }, 'Cold-drop concept'),
        h('h2', { className:'title' }, 'From film to fridge.'),
        h('p', null, 'This is the next brand bridge: the can moves from cinematic launch energy into a cold, ownable product ritual. It sells the feeling without pretending inventory exists.'),
        h('div', { className:'cold-proof' },
          h('span', null, 'Prelaunch asset'),
          h('span', null, 'One flavor only'),
          h('span', null, 'No payment today')
        )
      ),
      h(motion.div, { className:'cooler-frame', style:{ scale, opacity } },
        h('video', { src:'media/vortex-cooler.mp4', autoPlay:true, muted:true, loop:true, playsInline:true, preload:'metadata', 'aria-label':'VORTEX Original can in a cooler concept video' }),
        h('div', { className:'cooler-caption' }, h('span', null, 'VORTEX cold drop'), h('span', null, 'Concept film'))
      )
    )));
  }

  function Features(){
    const cards = [
      ['Formula discipline', 'Keep the launch story specific: target caffeine, target sugar, target can size, and no claims we cannot support yet.', 'frames/frame_0188.jpg', 'VORTEX Original can detail'],
      ['Original profile', 'The brand centers one cold, crisp original flavor so early demand is easier to read before production.', 'ocean/ocean_0068.jpg', 'Ocean vortex texture'],
      ['Launch signal', 'The site should gather interest, guide sampling, and show what the product world feels like without faking sales.', 'man/man_0068.jpg', 'Person drinking VORTEX Original']
    ];
    return h('section', { className:'section' }, h('div', { className:'wrap' },
      h('div', { className:'section-head' }, h('span', { className:'eyebrow' }, 'Feature beats'), h('h2', { className:'title' }, 'One claim at a time.')),
      h('div', { className:'features' }, cards.map((c) =>
        h(motion.article, { className:'feature-card', key:c[0], ...reveal },
          h('div', { className:'feature-copy' }, h('h3', { className:'title' }, c[0]), h('p', null, c[1])),
          h('img', { src:c[2], alt:c[3] })
        )
      ))
    ));
  }

  function BuyBox(){
    const [qty, setQty] = useState(1);
    const [cart, setCart] = useState('Join Waitlist');
    const [buy, setBuy] = useState('Retail Inquiry');
    const [delivery, setDelivery] = useState('launch');
    const unit = 29.99;
    const subtotal = (unit * qty).toFixed(2);
    const deliveryLabel = delivery === 'launch' ? 'Launch updates' : 'Sampling interest';
    const deliveryDate = delivery === 'launch' ? 'Launch window pending' : 'Sampling window pending';
    const flash = (setter, text, original) => { setter(text); setTimeout(() => setter(original), 1600); };
    return h(motion.aside, { className:'buy-box', id:'buy', ...reveal },
      h('div', { className:'price-line' }, h('span', { className:'price' }, '$29.99'), h('span', { className:'per' }, 'target 12-pack price')),
      h('div', { className:'stock' }, 'Prelaunch concept'),
      h('div', { className:'delivery' }, 'No payment is collected today. Join the list for ', h('b', null, deliveryDate), '.'),
      h('div', { className:'choice-row', 'aria-label':'Early access path' },
        h('button', { className:'choice ' + (delivery === 'launch' ? 'active' : ''), onClick:() => setDelivery('launch') }, h('b', null, 'Launch list'), h('span', null, 'Consumer interest')),
        h('button', { className:'choice ' + (delivery === 'sampling' ? 'active' : ''), onClick:() => setDelivery('sampling') }, h('b', null, 'Sampling'), h('span', null, 'Retail or gym interest'))
      ),
      h('div', { className:'qty-row' },
        h('div', { className:'qty' },
          h('button', { 'aria-label':'Decrease quantity', onClick:() => setQty(Math.max(1, qty - 1)) }, '-'),
          h('span', null, qty),
          h('button', { 'aria-label':'Increase quantity', onClick:() => setQty(Math.min(5, qty + 1)) }, '+')
        ),
        h('div', { className:'pack-note' }, '12-pack', h('br'), 'VORTEX Original')
      ),
      h('div', { className:'buy-lines' },
        h('div', { className:'buy-line' }, h('span', null, qty + ' x 12-pack interest'), h('strong', null, '$' + subtotal)),
        h('div', { className:'buy-line' }, h('span', null, deliveryLabel), h('strong', null, 'Pending')),
        h('div', { className:'buy-line' }, h('span', null, 'Due today'), h('strong', null, '$0.00'))
      ),
      h('div', { className:'buy-actions' },
        h('button', { className:'btn btn-amber', onClick:() => flash(setCart, 'Interest saved', 'Join Waitlist') }, cart),
        h('button', { className:'btn btn-teal', onClick:() => flash(setBuy, 'Inquiry noted', 'Retail Inquiry') }, buy)
      ),
      h('div', { className:'checkout-note' }, 'Prelaunch flow: this records intent in the prototype only. Replace with a real waitlist form before running paid ads.'),
      h('div', { className:'secure' }, 'No charge today'),
      h('div', { className:'launch-note' }, 'Use this section for email capture, retailer interest, or sampling requests once the backend is ready.')
    );
  }

  function Commerce(){
    const reviews = [
      ['People understand the cold ritual.', 'The cooler scene makes the product feel real without saying it is already shipping.', 'Brand signal', 'Validate in ads'],
      ['One flavor is easier to remember.', 'Original gives the brand a sharper launch story than a flavor wall before production.', 'Product signal', 'Keep focused'],
      ['The waitlist must be honest.', 'Early demand should measure interest, not pretend orders, reviews, or delivery dates exist.', 'Trust signal', 'No fake proof']
    ];
    return h('section', { className:'section', id:'reviews' }, h('div', { className:'wrap commerce' },
      h('div', null,
        h(motion.div, { ...reveal }, h('span', { className:'eyebrow' }, 'Launch proof'), h('h2', { className:'title' }, 'Advertise the world first.'), h('p', { className:'subhead' }, 'Before cans exist, VORTEX should sell the feeling, collect permission to follow up, and avoid claims that need product testing.')),
        h(motion.div, { className:'rating-panel', ...reveal },
          h('div', { className:'rating-score' }, '0', h('span', null, 'orders charged')),
          h('div', { className:'rating-bars' },
            [['Waitlist','100%','ready'],['Sampling','0%','next'],['Retail','0%','next'],['Proof','0%','needed']].map((row) =>
              h('div', { className:'rating-bar', key:row[0] }, h('span', null, row[0]), h('div', { className:'rating-track' }, h('i', { style:{ '--w': row[1] } })), h('span', null, row[2]))
            )
          )
        ),
        h('div', { className:'reviews' }, reviews.map((r) =>
          h(motion.div, { className:'review', key:r[0], ...reveal },
            h('div', { className:'stars' }, '\u2605\u2605\u2605\u2605\u2605'),
            h('h4', null, r[0]),
            h('p', null, r[1]),
            h('div', { className:'review-meta' }, h('span', null, r[2]), h('span', null, r[3]))
          )
        ))
      ),
      h(BuyBox)
    ));
  }

  function App(){
    return h('div', { className:'page' },
      h(Cursor),
      h(Nav),
      h(ProductHero),
      h(Stats),
      h(MotionMoment),
      h(ColdDrop),
      h(Features),
      h(Commerce),
      h('footer', null, h('div', { className:'wrap' }, h('span', { className:'logo' }, 'VORTEX'), h('div', null, h('span', null, 'VORTEX Original prelaunch'), h('a', { href:'index.html' }, 'The film'), h('a', { href:'#top' }, 'Top'))))
    );
  }

  createRoot(document.getElementById('root')).render(h(App));
</script>
</body>
</html>
