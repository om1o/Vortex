<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
<title>VORTEX — Scroll to open</title>
<style>
  @font-face {
    font-family: 'Inter';
    src: url('fonts/inter-variable.woff2') format('woff2');
    font-weight: 100 900;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: 'Oswald';
    src: url('fonts/oswald-variable.woff2') format('woff2');
    font-weight: 200 700;
    font-style: normal;
    font-display: swap;
  }

  :root {
    --bg-0: #020407;
    --bg-1: #070d15;
    --bg-2: #122029;
    --ink: #eef4f8;
    --accent: #4fc3d6;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html { scroll-behavior: auto; }

  body {
    font-family: 'Inter', "Helvetica Neue", Arial, sans-serif;
    font-feature-settings: "ss01", "cv11", "cv05";
    color: var(--ink);
    /* Clean gradient background that blends with the studio frames */
    background:
      radial-gradient(120% 90% at 50% 38%, var(--bg-2) 0%, var(--bg-1) 42%, var(--bg-0) 100%);
    background-attachment: fixed;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Tall spacer that creates the scroll distance driving the animation */
  #scroll-track { height: 1000vh; }

  /* The WebGL canvas is pinned to the viewport behind the text */
  #scene {
    position: fixed;
    inset: 0;
    width: 100%;
    height: 100%;
    z-index: 1;
    display: block;
  }

  /* Subtle darkening at top & bottom so headlines stay legible */
  .vignette {
    position: fixed;
    inset: 0;
    z-index: 2;
    pointer-events: none;
    background:
      radial-gradient(118% 96% at 54% 44%, rgba(2,5,9,0) 28%, rgba(2,5,9,0.5) 70%, rgba(0,1,3,0.86) 100%),
      linear-gradient(to bottom, rgba(2,4,8,0.62) 0%, rgba(2,4,8,0) 24%,
                      rgba(2,4,8,0) 70%, rgba(0,1,3,0.74) 100%);
  }

  .overlay {
    position: fixed;
    inset: 0;
    z-index: 3;
    pointer-events: none;
  }

  .hero {
    position: absolute;
    top: 50%;
    left: clamp(1.6rem, 6vw, 6rem);
    right: auto;
    max-width: min(34rem, 64vw);
    text-align: left;
    transform: translateY(-50%);
    will-change: opacity, transform;
  }
  .hero .kicker {
    display: inline-flex;
    align-items: center;
    gap: 0.75rem;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.34em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 1.35rem;
  }
  .hero .kicker i {
    width: 34px;
    height: 2px;
    background: var(--accent);
    box-shadow: 0 0 10px rgba(79,195,214,0.8);
  }
  .hero h1 {
    font-family: 'Oswald', 'Inter', sans-serif;
    font-size: clamp(3.8rem, 11vw, 8.5rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    line-height: 0.86;
    text-transform: uppercase;
    text-shadow: 0 8px 50px rgba(0,0,0,0.6);
  }
  .hero p {
    margin-top: 1.3rem;
    max-width: 22rem;
    font-size: clamp(0.82rem, 1.5vw, 1.05rem);
    font-weight: 400;
    line-height: 1.5;
    letter-spacing: 0.04em;
    opacity: 0.72;
  }

  /* Scroll-driven message reveals — same left zone as the hero, one at a time */
  .reveals { position: absolute; inset: 0; }
  .rline {
    position: absolute;
    top: 50%;
    left: clamp(1.6rem, 6vw, 6rem);
    max-width: min(30rem, 66vw);
    text-align: left;
    opacity: 0;
    transform: translateY(-50%);
    will-change: opacity, transform;
    font-size: clamp(1.7rem, 4.4vw, 3.1rem);
    font-weight: 500;
    line-height: 1.12;
    letter-spacing: 0.005em;
    text-shadow: 0 6px 40px rgba(0,0,0,0.55);
  }
  .rline .sub {
    display: block;
    margin-top: 0.5rem;
    font-weight: 400;
    opacity: 0.6;
    font-size: 0.8em;
  }

  .scrollcue {
    position: absolute;
    bottom: 5vh;
    left: 0; right: 0;
    text-align: center;
    font-size: 0.7rem;
    letter-spacing: 0.5em;
    text-indent: 0.5em;
    text-transform: uppercase;
    opacity: 0.7;
    will-change: opacity;
  }
  .scrollcue .mouse {
    margin: 14px auto 0;
    width: 24px; height: 38px;
    border: 2px solid rgba(238,244,248,0.6);
    border-radius: 13px;
    position: relative;
  }
  .scrollcue .mouse::after {
    content: "";
    position: absolute;
    top: 7px; left: 50%;
    width: 3px; height: 7px;
    margin-left: -1.5px;
    background: var(--ink);
    border-radius: 2px;
    animation: wheel 1.6s ease-in-out infinite;
  }
  @keyframes wheel {
    0% { transform: translateY(0); opacity: 1; }
    70% { transform: translateY(11px); opacity: 0; }
    100% { transform: translateY(0); opacity: 0; }
  }

  .closing {
    position: absolute;
    bottom: 16vh;
    left: 0; right: 0;
    text-align: center;
    opacity: 0;
    will-change: opacity, transform;
  }
  .closing h2 {
    font-family: 'Oswald', 'Inter', sans-serif;
    font-size: clamp(2.4rem, 8vw, 5.5rem);
    font-weight: 700;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    text-shadow: 0 6px 40px rgba(0,0,0,0.5);
  }
  .closing span {
    display: block;
    margin-top: 0.8rem;
    font-size: 0.7rem;
    letter-spacing: 0.45em;
    text-indent: 0.45em;
    text-transform: uppercase;
    opacity: 0.7;
  }

  /* Loading screen */
  #loader {
    position: fixed;
    inset: 0;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1.6rem;
    background: radial-gradient(120% 90% at 50% 40%, var(--bg-2) 0%, var(--bg-1) 45%, var(--bg-0) 100%);
    transition: opacity 0.8s ease;
  }
  #loader .mark {
    font-size: clamp(2rem, 8vw, 3.6rem);
    font-weight: 800;
    letter-spacing: 0.3em;
    text-indent: 0.3em;
    opacity: 0.9;
  }
  #loader .bar {
    width: min(60vw, 280px);
    height: 2px;
    background: rgba(238,244,248,0.18);
    border-radius: 2px;
    overflow: hidden;
  }
  #loader .bar > i {
    display: block;
    height: 100%;
    width: 0%;
    background: var(--accent);
    box-shadow: 0 0 12px var(--accent);
    transition: width 0.15s linear;
  }
  #loader .pct {
    font-size: 0.7rem;
    letter-spacing: 0.4em;
    text-indent: 0.4em;
    opacity: 0.6;
  }
  #loader.hidden { opacity: 0; pointer-events: none; }
</style>
</head>
<body>
  <canvas id="scene"></canvas>
  <div class="vignette"></div>

  <div class="overlay">
    <div class="hero" id="hero">
      <span class="kicker"><i></i>Sparkling · 16 fl oz</span>
      <h1>VORTEX</h1>
      <p>Energy pulled from the deep.</p>
    </div>

    <div class="reveals">
      <p class="rline" data-start="0.16" data-end="0.32">Enter the zone.</p>
      <p class="rline" data-start="0.34" data-end="0.50">Your life,<br>put back together.</p>
      <p class="rline" data-start="0.52" data-end="0.68">Energy without the crash.</p>
      <p class="rline" data-start="0.70" data-end="0.84">Made for focus.<span class="sub">Methods that actually work.</span></p>
    </div>
    <div class="scrollcue" id="cue">
      Scroll
      <div class="mouse"></div>
    </div>
    <div class="closing" id="closing">
      <h2>Crack it open.</h2>
      <span>Zero sugar · 200 mg caffeine</span>
    </div>
  </div>

  <div id="scroll-track"></div>

  <div id="loader">
    <div class="mark">VORTEX</div>
    <div class="bar"><i id="bar"></i></div>
    <div class="pct" id="pct">LOADING 0%</div>
  </div>

  <script type="importmap">
  { "imports": { "three": "./libs/three.module.js" } }
  </script>

  <script type="module">
    import * as THREE from 'three';

    // ---- Config ----------------------------------------------------------
    const TOTAL_FRAMES = 477;
    const FRAME_W = 880, FRAME_H = 720;    // tight crop on the can (watermark removed)
    const framePath = (n) => `frames/frame_${String(n).padStart(4, '0')}.jpg`;
    const SMOOTHING = 0.09;                // scroll → frame easing (0..1)

    // ---- Preload all frames ---------------------------------------------
    const images = new Array(TOTAL_FRAMES);
    let loaded = 0;
    const barEl = document.getElementById('bar');
    const pctEl = document.getElementById('pct');
    const loaderEl = document.getElementById('loader');

    function bumpProgress() {
      loaded++;
      const p = Math.round((loaded / TOTAL_FRAMES) * 100);
      barEl.style.width = p + '%';
      pctEl.textContent = 'LOADING ' + p + '%';
      if (loaded === TOTAL_FRAMES) start();
    }

    for (let i = 0; i < TOTAL_FRAMES; i++) {
      const img = new Image();
      img.decoding = 'async';
      img.onload = () => { images[i] = img; bumpProgress(); };
      img.onerror = () => { bumpProgress(); };   // never hang on a missing frame
      img.src = framePath(i + 1);
    }

    // ---- Three.js scene --------------------------------------------------
    let renderer, scene, camera, mesh, texture;
    let currentProgress = 0, targetProgress = 0, shownFrame = -1;

    function initScene() {
      const canvas = document.getElementById('scene');
      renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
      renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
      renderer.outputColorSpace = THREE.SRGBColorSpace;

      scene = new THREE.Scene();
      camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0, 10);
      camera.position.z = 1;

      texture = new THREE.Texture(images[0]);
      texture.colorSpace = THREE.SRGBColorSpace;
      texture.minFilter = THREE.LinearFilter;
      texture.magFilter = THREE.LinearFilter;
      texture.generateMipmaps = false;
      texture.needsUpdate = true;

      mesh = new THREE.Mesh(
        new THREE.PlaneGeometry(1, 1),
        new THREE.MeshBasicMaterial({ map: texture })
      );
      scene.add(mesh);

      resize();
      window.addEventListener('resize', resize);
    }

    // "contain" fit: keep the whole can visible; dark gradient frames the sides
    function resize() {
      const w = window.innerWidth, h = window.innerHeight;
      renderer.setSize(w, h);
      const aspect = w / h;
      camera.left = -aspect; camera.right = aspect;
      camera.top = 1; camera.bottom = -1;
      camera.updateProjectionMatrix();

      const boxW = 2 * aspect, boxH = 2;
      const scale = Math.min(boxW / FRAME_W, boxH / FRAME_H);
      mesh.scale.set(FRAME_W * scale, FRAME_H * scale, 1);
    }

    // ---- Scroll → progress ----------------------------------------------
    function updateTarget() {
      const max = document.documentElement.scrollHeight - window.innerHeight;
      targetProgress = max > 0 ? Math.min(Math.max(window.scrollY / max, 0), 1) : 0;
    }
    window.addEventListener('scroll', updateTarget, { passive: true });

    // ---- Overlay text reacting to progress ------------------------------
    const heroEl = document.getElementById('hero');
    const cueEl = document.getElementById('cue');
    const closingEl = document.getElementById('closing');
    const rlineEls = Array.from(document.querySelectorAll('.rline'));
    const clamp01 = (x) => Math.min(Math.max(x, 0), 1);
    const easeOutCubic = (t) => 1 - Math.pow(1 - t, 3);

    // A line slides up from below, holds, then drifts up and fades — scrubbed by scroll
    function revealLine(p, start, end) {
      if (p <= start) return { o: 0, dy: 26 };
      if (p >= end) return { o: 0, dy: -26 };
      const t = (p - start) / (end - start);
      const IN = 0.30, OUT = 0.70;
      if (t < IN) { const k = easeOutCubic(t / IN); return { o: k, dy: 26 * (1 - k) }; }
      if (t > OUT) { const k = easeOutCubic((t - OUT) / (1 - OUT)); return { o: 1 - k, dy: -26 * k }; }
      return { o: 1, dy: 0 };
    }

    function updateOverlay(p) {
      // Brand hero fades out over the first 14% of scroll, drifting upward
      const heroOut = clamp01(p / 0.14);
      heroEl.style.opacity = (1 - heroOut).toFixed(3);
      heroEl.style.transform = `translateY(calc(-50% - ${(40 * heroOut).toFixed(1)}px))`;

      // Scroll cue disappears almost immediately
      cueEl.style.opacity = clamp01(1 - p / 0.05).toFixed(3);

      // Message lines reveal one at a time while the can spins
      for (const el of rlineEls) {
        const r = revealLine(p, +el.dataset.start, +el.dataset.end);
        el.style.opacity = r.o.toFixed(3);
        el.style.transform = `translateY(calc(-50% + ${r.dy.toFixed(1)}px))`;
      }

      // Closing statement bursts in as the lid pops and the water peaks (last ~14%)
      const inAmt = clamp01((p - 0.86) / 0.10);
      closingEl.style.opacity = inAmt.toFixed(3);
      closingEl.style.transform = `translateY(${(24 * (1 - inAmt)).toFixed(1)}px)`;
    }

    // ---- Render loop -----------------------------------------------------
    function tick() {
      currentProgress += (targetProgress - currentProgress) * SMOOTHING;
      if (Math.abs(targetProgress - currentProgress) < 0.0002) currentProgress = targetProgress;

      const frame = Math.round(currentProgress * (TOTAL_FRAMES - 1));
      if (frame !== shownFrame && images[frame]) {
        texture.image = images[frame];
        texture.needsUpdate = true;
        shownFrame = frame;
      }
      updateOverlay(currentProgress);
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    }

    function start() {
      initScene();
      updateTarget();
      loaderEl.classList.add('hidden');
      requestAnimationFrame(tick);
    }
  </script>
</body>
</html>
